<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股即時看板</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f0e8;--surface:#fdfaf4;--border:#e0d8c8;
    --accent-green:#c0392b;--accent-red:#1a7a5e;--accent-blue:#2c5f8a;--accent-yellow:#b8860b;
    --text-primary:#2a2118;--text-muted:#8a7a65;--text-dim:#c8bfaf;
    --font-mono:'DM Mono',monospace;--font-sans:'Noto Sans TC',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text-primary);font-family:var(--font-sans);min-height:100vh;padding:20px;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--text-dim) 1px,transparent 1px),linear-gradient(90deg,var(--text-dim) 1px,transparent 1px);background-size:40px 40px;opacity:.35;pointer-events:none;z-index:0;}
  .container{max-width:940px;margin:0 auto;position:relative;z-index:1;}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--border);}
  .logo{font-family:var(--font-mono);font-size:11px;letter-spacing:.2em;color:var(--text-muted);}
  .logo span{color:var(--accent-blue);}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .section-title{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;color:var(--text-muted);text-transform:uppercase;}
  .oi-date{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
  .history-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:14px;box-shadow:0 2px 12px rgba(100,80,50,.07);}
  .up{color:var(--accent-green);}
  .down{color:var(--accent-red);}
  .neutral{color:var(--text-muted);}
  .spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent-blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── 週K線樣式 ── */
  .skline-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
  .skline-stat{background:#f0ebe0;border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
  .skline-stat-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;color:var(--text-muted);margin-bottom:4px;}
  .skline-stat-val{font-family:var(--font-mono);font-size:17px;font-weight:500;}
  .skline-canvas-wrap{position:relative;height:320px;width:100%;}
  .skline-vol-wrap{position:relative;height:80px;width:100%;margin-top:6px;}
  .skline-loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;background:var(--surface);border-radius:6px;z-index:5;}
  .skline-src{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);text-align:right;margin-top:6px;}
  #wkTip{
    position:fixed;display:none;
    background:rgba(253,250,244,0.97);
    border:1px solid var(--border);border-radius:8px;
    padding:10px 14px;font-family:var(--font-mono);font-size:11px;
    line-height:1.9;pointer-events:none;z-index:999;min-width:170px;
    box-shadow:0 4px 20px rgba(100,80,50,.15);
  }
  #wkTip .stip-label{font-size:10px;color:var(--text-muted);margin-bottom:2px;}
  #wkTip .stip-row{display:flex;justify-content:space-between;gap:18px;}
  #wkTip .stip-lbl{color:var(--text-muted);}

  @media(max-width:640px){
    .skline-stats{grid-template-columns:repeat(2,1fr);}
    .skline-stat-val{font-size:14px;}
    .history-card table{font-size:10px;}
    .history-card th,.history-card td{padding:6px 6px !important;}
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo"><span>shixianba</span> · 即時看板</div>
  </header>

  <!-- 台指期 週K線（星期四～次週三） -->
  <div class="history-card" style="margin-bottom:14px;">
    <div class="section-header">
      <div class="section-title">▪ 台指期　週K線（近20週）</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:10px;">
        <span>週期：星期四 ～ 次週三</span>
        <span id="wkDateRange" style="color:var(--text-dim)">—</span>
      </div>
    </div>
    <div class="skline-stats">
      <div class="skline-stat"><div class="skline-stat-label">最新收盤</div><div class="skline-stat-val neutral" id="wkClose">—</div></div>
      <div class="skline-stat"><div class="skline-stat-label">本週漲跌</div><div class="skline-stat-val neutral" id="wkChg">—</div></div>
      <div class="skline-stat"><div class="skline-stat-label">區間最高</div><div class="skline-stat-val up" id="wkHigh">—</div></div>
      <div class="skline-stat"><div class="skline-stat-label">區間最低</div><div class="skline-stat-val down" id="wkLow">—</div></div>
    </div>
    <div class="skline-canvas-wrap" id="wkWrap">
      <div class="skline-loader" id="wkLoader">
        <span class="spinner"></span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)" id="wkLoaderMsg">載入資料…</span>
      </div>
      <canvas id="wkCanvas"></canvas>
    </div>
    <div class="skline-vol-wrap" id="wvWrap">
      <canvas id="wvCanvas"></canvas>
    </div>
    <div class="skline-src" id="wkSrc">資料來源：Yahoo Finance ^TWII（加權指數替代）・每5分鐘自動更新</div>
  </div>

  <!-- 個股關注清單（可由試算表同步） -->
  <div class="history-card" style="margin-bottom:14px;">
    <div class="section-header">
      <div class="section-title">▪ 個股關注清單</div>
      <div class="oi-date" id="wlUpdateTime"><span class="spinner"></span>載入中...</div>
    </div>
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:12px;">
        <thead>
          <tr style="border-bottom:1px solid var(--border);text-align:left;color:var(--text-muted);font-size:10px;letter-spacing:.05em;">
            <th style="padding:8px 10px;">代號</th>
            <th style="padding:8px 10px;">名稱</th>
            <th style="padding:8px 10px;text-align:right;">現價</th>
            <th style="padding:8px 10px;text-align:right;">PE</th>
            <th style="padding:8px 10px;">營收趨勢</th>
            <th style="padding:8px 10px;">估值位置</th>
            <th style="padding:8px 10px;text-align:right;">殖利率</th>
            <th style="padding:8px 10px;">風險</th>
            <th style="padding:8px 10px;">題材／備註</th>
          </tr>
        </thead>
        <tbody id="watchlistBody">
          <tr><td colspan="9" style="padding:14px;text-align:center;color:var(--text-muted);">載入中...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="skline-src" id="wlSrc">資料來源：手動內建資料（尚未連結試算表）</div>
  </div>
</div>

<div id="wkTip">
  <div class="stip-label" id="wkTipLabel"></div>
  <div class="stip-row"><span class="stip-lbl">開</span><span id="wkTipO"></span></div>
  <div class="stip-row"><span class="stip-lbl">高</span><span id="wkTipH" class="up"></span></div>
  <div class="stip-row"><span class="stip-lbl">低</span><span id="wkTipL" class="down"></span></div>
  <div class="stip-row"><span class="stip-lbl">收</span><span id="wkTipC"></span></div>
  <div class="stip-row"><span class="stip-lbl">漲跌</span><span id="wkTipChg"></span></div>
  <div class="stip-row"><span class="stip-lbl">成交量</span><span id="wkTipV" style="color:var(--text-muted)"></span></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// 工具
// ══════════════════════════════════════════════════════════════════
const fmtI = n=>n==null?'—':Math.round(n).toLocaleString('zh-TW');
const fmtV = v=>{if(!v||v===0)return'—';if(v>=1e9)return(v/1e9).toFixed(1)+'B';if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(0)+'K';return String(v);};

// ══════════════════════════════════════════════════════════════════
// ██  台指期 週K線（星期四 ～ 次週三）  ███████████████████████████
// ══════════════════════════════════════════════════════════════════
function buildWeeklyBars(dailyBars){
  if(!dailyBars.length) return [];
  const buckets = new Map();
  for(const b of dailyBars){
    // 以 UTC+8（台北）換算星期幾，避免瀏覽器時區差異
    const shifted = new Date((b.ts+8*3600)*1000);
    const y=shifted.getUTCFullYear(), m=shifted.getUTCMonth(), day=shifted.getUTCDate(), wd=shifted.getUTCDay();
    const diffToThu = (wd-4+7)%7; // 0=週四...6=週三，回推到本週期起始（週四）
    const weekStart = new Date(Date.UTC(y,m,day));
    weekStart.setUTCDate(weekStart.getUTCDate()-diffToThu);
    const key = `${weekStart.getUTCFullYear()}-${String(weekStart.getUTCMonth()+1).padStart(2,'0')}-${String(weekStart.getUTCDate()).padStart(2,'0')}`;
    if(!buckets.has(key)) buckets.set(key,[]);
    buckets.get(key).push(b);
  }
  const keys=[...buckets.keys()].sort();
  return keys.map(key=>{
    const slice=buckets.get(key).sort((a,c)=>a.ts-c.ts);
    const [y,m,day]=key.split('-').map(Number);
    const endDt=new Date(Date.UTC(y,m-1,day));
    endDt.setUTCDate(endDt.getUTCDate()+6); // 週四 +6天 = 次週三
    const endKey=`${endDt.getUTCFullYear()}-${String(endDt.getUTCMonth()+1).padStart(2,'0')}-${String(endDt.getUTCDate()).padStart(2,'0')}`;
    return{
      label:`${String(m).padStart(2,'0')}/${String(day).padStart(2,'0')}`,
      startDate:key, endDate:endKey,
      o:slice[0].o,
      h:Math.max(...slice.map(x=>x.h)),
      l:Math.min(...slice.map(x=>x.l)),
      c:slice[slice.length-1].c,
      v:slice.reduce((s,x)=>s+(x.v||0),0),
      days:slice.length,
    };
  });
}

// ── Canvas 繪圖 ────────────────────────────────────────────────────
const SKP = {top:10, right:58, bottom:32, left:4};
let _wkBars=[], _wkCtx=null, _wvCtx=null;

function sk_p2y(p,h,mn,mx){return SKP.top+(1-(p-mn)/(mx-mn))*(h-SKP.top-SKP.bottom);}
function sk_i2x(i,n,w){return SKP.left+(i+0.5)*((w-SKP.left-SKP.right)/n);}

function drawSK(ctx,w,h,bars,allH,allL){
  ctx.clearRect(0,0,w,h);
  const n=bars.length;
  const pad=(allH-allL)*0.05;
  const mn=allL-pad, mx=allH+pad;
  const bw=Math.max(3,(w-SKP.left-SKP.right)/n*0.58);

  ctx.lineWidth=0.5;
  for(let i=0;i<=5;i++){
    const val=mn+(mx-mn)*(i/5);
    const y=SKP.top+(1-i/5)*(h-SKP.top-SKP.bottom);
    ctx.strokeStyle='rgba(224,216,200,0.6)';
    ctx.beginPath();ctx.moveTo(SKP.left,y);ctx.lineTo(w-SKP.right,y);ctx.stroke();
    ctx.fillStyle='#b0a090';ctx.font='9px DM Mono,monospace';ctx.textAlign='left';
    ctx.fillText(fmtI(val),w-SKP.right+3,y+3);
  }
  ctx.fillStyle='#b0a090';ctx.font='9px DM Mono,monospace';ctx.textAlign='center';
  for(let i=0;i<n;i++){
    if(i%3===0||i===n-1){
      ctx.fillText(bars[i].label,sk_i2x(i,n,w),h-SKP.bottom+13);
    }
  }
  for(let i=0;i<n;i++){
    const b=bars[i], x=sk_i2x(i,n,w);
    const isUp=b.c>=b.o;
    const color=isUp?'#c0392b':'#1a7a5e';
    const yH=sk_p2y(b.h,h,mn,mx),yL=sk_p2y(b.l,h,mn,mx);
    const yO=sk_p2y(b.o,h,mn,mx),yC=sk_p2y(b.c,h,mn,mx);
    ctx.strokeStyle=color;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,yH);ctx.lineTo(x,yL);ctx.stroke();
    ctx.fillStyle=color;
    ctx.fillRect(x-bw/2,Math.min(yO,yC),bw,Math.max(1.5,Math.abs(yC-yO)));
  }
}

function drawSV(ctx,w,h,bars){
  ctx.clearRect(0,0,w,h);
  const n=bars.length;
  const maxV=Math.max(...bars.map(b=>b.v||0));
  if(!maxV){
    ctx.fillStyle='#c8bfaf';ctx.font='10px DM Mono,monospace';
    ctx.fillText('成交量無資料',12,h/2);return;
  }
  const bw=Math.max(3,(w-SKP.left-SKP.right)/n*0.6);
  const vT=4,vB=16;
  for(let i=0;i<n;i++){
    const b=bars[i];if(!b.v)continue;
    const x=sk_i2x(i,n,w);
    const bh=(b.v/maxV)*(h-vT-vB);
    ctx.fillStyle=b.c>=b.o?'rgba(192,57,43,0.55)':'rgba(26,122,94,0.55)';
    ctx.fillRect(x-bw/2,h-vB-bh,bw,bh);
  }
  ctx.fillStyle='#c8bfaf';ctx.font='9px DM Mono,monospace';ctx.textAlign='left';
  ctx.fillText(fmtV(maxV),w-SKP.right+3,vT+10);
}

function resizeWK(){
  const kC=document.getElementById('wkCanvas');
  const vC=document.getElementById('wvCanvas');
  kC.width=document.getElementById('wkWrap').offsetWidth;
  kC.height=document.getElementById('wkWrap').offsetHeight;
  vC.width=document.getElementById('wvWrap').offsetWidth;
  vC.height=document.getElementById('wvWrap').offsetHeight;
}

function renderWeeklyCharts(){
  if(!_wkBars.length) return;
  resizeWK();
  const allH=Math.max(..._wkBars.map(b=>b.h));
  const allL=Math.min(..._wkBars.map(b=>b.l));
  _wkCtx=document.getElementById('wkCanvas').getContext('2d');
  _wvCtx=document.getElementById('wvCanvas').getContext('2d');
  drawSK(_wkCtx,document.getElementById('wkCanvas').width,document.getElementById('wkCanvas').height,_wkBars,allH,allL);
  drawSV(_wvCtx,document.getElementById('wvCanvas').width,document.getElementById('wvCanvas').height,_wkBars);
  setupWKHover(allH,allL);
}

function setupWKHover(allH,allL){
  const canvas=document.getElementById('wkCanvas');
  const tip=document.getElementById('wkTip');
  const n=_wkBars.length;

  canvas.onmousemove=e=>{
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const w=canvas.width;
    const area=w-SKP.left-SKP.right;
    const idx=Math.min(n-1,Math.max(0,Math.floor((x-SKP.left)/(area/n))));
    const b=_wkBars[idx];
    const chg=b.c-b.o, pct=(chg/b.o*100).toFixed(2);

    drawSK(_wkCtx,w,canvas.height,_wkBars,allH,allL);
    const bx=sk_i2x(idx,n,w);
    _wkCtx.strokeStyle='rgba(44,95,138,0.35)';_wkCtx.lineWidth=1;_wkCtx.setLineDash([3,3]);
    _wkCtx.beginPath();_wkCtx.moveTo(bx,SKP.
